<!DOCTYPE html>

    <style>

    <div class="flex justify-between text-[10px] text-gray-400 mt-1 uppercase font-bold tracking-wider">

        <span>Max: 1000</span>
    </div>
</section>
        /* Smooth transitions for Dark Mode */
        * { transition: background-color 0.3s, border-color 0.3s, color 0.3s; }
    </style>
</head>
<body class="bg-gray-100 dark:bg-gray-950 flex justify-center">

        </span>
    </div>

    <div class="relative cursor-pointer">
        <i class="fas fa-shopping-cart text-gray-400 text-xl"></i>
        <span id="cartBadge" class="hidden absolute -top-1 -right-1 h-4 w-4 bg-blue-600 rounded-full text-[10px] text-white flex items-center justify-center font-bold">0</span>
    </div>
</div>
            <div class="flex items-center ml-2 border-l dark:border-gray-800 pl-3">
    <div class="relative group cursor-pointer">
        <img src="https://ui-avatars.com/api/?name=Alexander+Bempah&background=0D8ABC&color=fff" 
             alt="User Profile" 
             class="w-9 h-9 rounded-full border-2 border-blue-600 p-0.5 object-cover">
        
        <span class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 border-2 border-white dark:border-gray-900 rounded-full"></span>
    </div>
</div>
        </nav>

        <header class="p-4">
            <div class="relative">
                <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>

            </div>
        </header>

      <section class="sticky top-[65px] z-40 bg-white/95 dark:bg-gray-900/95 backdrop-blur-sm py-4 border-b dark:border-gray-800">

        <button class="category-btn active flex-shrink-0 flex flex-col items-center space-y-1">

            </div>
            <span class="text-[10px] font-bold uppercase tracking-tight dark:text-gray-300">All</span>
        </button>

        <button class="category-btn flex-shrink-0 flex flex-col items-center space-y-1 text-gray-400">
            <div class="w-12 h-12 rounded-2xl bg-gray-100 dark:bg-gray-800 flex items-center justify-center">
                <i class="fas fa-pen-nib"></i>
            </div>
            <span class="text-[10px] font-bold uppercase tracking-tight">Graphics</span>
        </button>

        <button class="category-btn flex-shrink-0 flex flex-col items-center space-y-1 text-gray-400">
            <div class="w-12 h-12 rounded-2xl bg-gray-100 dark:bg-gray-800 flex items-center justify-center">

            </div>

        </button>

        <button class="category-btn flex-shrink-0 flex flex-col items-center space-y-1 text-gray-400">
            <div class="w-12 h-12 rounded-2xl bg-gray-100 dark:bg-gray-800 flex items-center justify-center">
                <i class="fas fa-tools"></i>
            </div>
            <span class="text-[10px] font-bold uppercase tracking-tight">Repair</span>
        </button>

    </div>
        </section>

        <main class="flex-1 p-4 pb-24 space-y-6">
            <h2 class="text-lg font-bold dark:text-white">Fresh for you</h2>
            
            <div class="bg-gray-50 dark:bg-gray-800/50 rounded-3xl overflow-hidden border dark:border-gray-800 transition-all hover:scale-[1.02]">
                <img src="https://images.unsplash.com/photo-1587620962725-abab7fe55159?w=500" class="h-48 w-full object-cover">
                <div class="p-4">
                    <div class="flex justify-between items-start mb-2">
                        <h3 class="font-bold text-gray-800 dark:text-white text-lg">Web Development Setup</h3>
                        <span class="text-blue-600 font-extrabold">GH₵ 400</span>
                    </div>
                    <p class="text-gray-500 dark:text-gray-400 text-sm mb-4">Complete HTML/CSS/JS installation and local server setup.</p>
                    <button class="w-full bg-gray-900 dark:bg-white dark:text-gray-900 text-white py-3 rounded-xl font-bold text-sm">View Details</button>
                </div>
            </div>

            <div class="bg-gray-50 dark:bg-gray-800/50 rounded-3xl overflow-hidden border dark:border-gray-800 transition-all hover:scale-[1.02]">
                <img src="https://images.unsplash.com/photo-1626785774573-4b799315345d?w=500" class="h-48 w-full object-cover">
                <div class="p-4">
                    <div class="flex justify-between items-start mb-2">
                        <h3 class="font-bold text-gray-800 dark:text-white text-lg">Professional Logo</h3>
                        <span class="text-blue-600 font-extrabold">GH₵ 120</span>
                    </div>
                    <p class="text-gray-500 dark:text-gray-400 text-sm mb-4">High-quality minimalist designs for your startup.</p>
                    <button class="w-full bg-gray-900 dark:bg-white dark:text-gray-900 text-white py-3 rounded-xl font-bold text-sm">View Details</button>
                </div>
            </div>
        </main>

        <nav class="fixed bottom-0 w-full max-w-[450px] bg-white/90 dark:bg-gray-900/90 backdrop-blur-lg border-t dark:border-gray-800 px-6 py-4 flex justify-between items-center shadow-inner">
            <a href="#" class="text-blue-600"><i class="fas fa-home text-xl"></i></a>
            <a href="#" class="text-gray-400"><i class="fas fa-search text-xl"></i></a>
            <div class="w-14 h-14 bg-blue-600 rounded-full flex items-center justify-center text-white shadow-xl shadow-blue-500/40 -mt-12 border-4 border-white dark:border-gray-900">
                <i class="fas fa-plus text-xl"></i>
            </div>
            <a href="#" class="text-gray-400"><i class="fas fa-comment-dots text-xl"></i></a>
            <a href="#" class="text-gray-400"><i class="fas fa-user text-xl"></i></a>
        </nav>

    </div>

    <script>
        const darkToggle = document.getElementById('darkToggle');
        const html = document.documentElement;

        darkToggle.addEventListener('click', () => {
            html.classList.toggle('dark');
            const icon = darkToggle.querySelector('i');
            
            if (html.classList.contains('dark')) {
                icon.classList.replace('fa-moon', 'fa-sun');
                localStorage.setItem('theme', 'dark');
            } else {
                icon.classList.replace('fa-sun', 'fa-moon');
                localStorage.setItem('theme', 'light');
            }
        });

        // Keep theme after refresh
        if (localStorage.getItem('theme') === 'dark') {
            html.classList.add('dark');
            darkToggle.querySelector('i').classList.replace('fa-moon', 'fa-sun');
        }
    </script>
</body>
</html>
